<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>코코나라 예약관리</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#f2f3f5;font-size:13px;color:#111}

/* HEADER */
.hd{background:#fff;border-bottom:2px solid #111;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd-left{display:flex;align-items:center;gap:8px}
.logo{font-size:14px;font-weight:900;letter-spacing:-0.5px}
.logo em{color:#1D9E75;font-style:normal}
.today{font-size:11px;font-weight:700;background:#111;color:#fff;padding:2px 8px;border-radius:4px}
.hd-stats{display:flex;gap:4px}
.hd-stat{text-align:center;background:#f5f5f5;border:1.5px solid #ddd;border-radius:6px;padding:2px 8px;min-width:46px}
.hd-stat .n{font-size:16px;font-weight:900;line-height:1.2;color:#111}
.hd-stat .l{font-size:9px;color:#666;font-weight:500}
.hd-stat.hl .n{color:#1D9E75}
.hd-stat.rd .n{color:#E24B4A}
.hd-right{display:flex;gap:4px}
.btn-sm{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;padding:4px 9px;border-radius:6px;border:1.5px solid #111;background:#fff;cursor:pointer;transition:background .12s}
.btn-sm:hover{background:#f0f0f0}
.btn-sm.green{background:#1D9E75;color:#fff;border-color:#1D9E75}

/* 페이지 탭 */
.page-tabs{display:flex;background:#111;padding:0 10px}
.page-tab{font-family:'Noto Sans KR',sans-serif;padding:8px 18px;font-size:13px;font-weight:700;color:#888;background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .12s}
.page-tab.on{color:#fff;border-bottom:3px solid #1D9E75}
.page-tab:hover{color:#ccc}
.page-content{display:none}
.page-content.on{display:block}

/* ── 차량 현황 패널 ── */
.fleet-panel{background:#fff;border-bottom:2px solid #111;padding:5px 10px}
.fleet-title{font-size:10px;font-weight:700;color:#888;letter-spacing:0.05em;margin-bottom:4px}
.fleet-card{display:inline-flex;gap:18px;background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:7px 12px}
.fc-group{display:flex;flex-direction:column;min-width:90px}
.fc-name{font-size:11px;font-weight:900;text-align:left;margin-bottom:4px;padding-bottom:4px;border-bottom:1.5px solid #eee;color:#111}
.fc-row{display:flex;align-items:center;gap:8px;padding:2px 0}
.fc-row.fc-rem{background:#f0faf6;border-radius:4px;margin-top:2px;padding:3px 6px}
.fc-label{font-size:10px;font-weight:700;color:#888;flex-shrink:0;width:24px}
.fleet-card input{font-family:'Noto Sans KR',sans-serif;width:22px;text-align:right;font-size:14px;font-weight:900;border:none;outline:none;background:transparent;cursor:pointer;padding:1px;-moz-appearance:textfield}
.fleet-card input::-webkit-outer-spin-button,.fleet-card input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.fleet-card input:focus{background:#fffbe6;border-radius:3px}
.fleet-card .fc-rem input{font-size:16px}
input.v-pa{color:#111}
input.v-o{color:#CC0000}
input.v-ko{color:#0055CC}
/* 예약 대수 바 */
.resv-bar{display:flex;align-items:center;gap:8px;padding:5px 10px;background:#f8f8f8;border-bottom:1px solid #e0e0e0}
.resv-bar-label{font-size:10px;font-weight:700;color:#888}
.resv-bar-item{font-size:12px;font-weight:700;padding:2px 10px;border-radius:4px;border:1.5px solid}
.rbi-pa{color:#111;border-color:#aaa;background:#f0f0f0}
.rbi-o {color:#CC0000;border-color:#CC0000;background:#fff5f5}
.rbi-ko{color:#0055CC;border-color:#0055CC;background:#f0f4ff}

/* TABS */


/* TABLE */
.tbl-wrap{overflow-x:auto;padding:6px 8px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;border:1.5px solid #222}
thead tr{background:#111}
th{padding:5px 6px;font-size:10px;font-weight:700;color:#fff;text-align:left;letter-spacing:0.03em;white-space:nowrap}
tbody tr{border-bottom:1px solid #e8e8e8;cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f7faf9}
tbody tr.done{opacity:0.32}
tbody tr.expanded{background:#f0faf6}
td{padding:2px 6px;vertical-align:middle;white-space:nowrap;line-height:1.1}

.td-time{font-size:13px;font-weight:900;color:#777}
.td-name{font-size:13px;font-weight:900;color:#111}
.new-bd{font-size:9px;font-weight:800;background:#E24B4A;color:#fff;padding:1px 4px;border-radius:3px;margin-left:2px;animation:blink 1.2s infinite}

/* 차량 텍스트 */
.vehicles{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.vo  {font-size:13px;font-weight:900;color:#CC0000}
.vpa {font-size:13px;font-weight:900;color:#111}
.vko {font-size:13px;font-weight:900;color:#0055CC}
.vo2 {font-size:13px;font-weight:900;color:#CC0000;opacity:.6}
.vpa2{font-size:13px;font-weight:900;color:#111;opacity:.6}
.vko2{font-size:13px;font-weight:900;color:#0055CC;opacity:.6}

/* 채널 */
.td-site{font-size:12px;font-weight:900;color:#888;line-height:1.1}
.site-sub{display:none}

/* 문자 버튼 */
.sms-wrap{display:flex;align-items:center;gap:2px;flex-wrap:nowrap;white-space:nowrap}
.sms-main-btns{display:flex;gap:2px;flex-wrap:nowrap}
.sms-num{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:800;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1.5px solid;cursor:pointer;background:#fff;transition:all .15s}
.sms-num:hover{opacity:0.7}
.sn1{border-color:#1D9E75;color:#1D9E75}
.sn2{border-color:#0055CC;color:#0055CC}
.sn1.sent{background:#1D9E75;color:#fff;border-color:#1D9E75}
.sn2.sent{background:#0055CC;color:#fff;border-color:#0055CC}
.sn3.sent,.sn4.sent,.sn5.sent,.sn6.sent{opacity:1;filter:brightness(0.7)}
.sn3{border-color:#CC7700;color:#CC7700}
.sn4{border-color:#880088;color:#880088}
.sn5{border-color:#CC0000;color:#CC0000}
.sn6{border-color:#555;color:#555}
.sms-toggle{font-family:'Noto Sans KR',sans-serif;font-size:9px;font-weight:700;width:16px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:4px;border:1.5px solid #ccc;color:#999;background:#f5f5f5;cursor:pointer}
.sms-extra-row{display:none;gap:2px;margin-top:2px}
.sms-extra-row.open{display:flex}

.done-chk{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;background:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:11px;transition:all .12s}
.done-chk.checked{background:#1D9E75;border-color:#1D9E75;color:#fff}
.act-icon{font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:800;padding:3px 9px;border-radius:6px;border:1.5px solid;cursor:pointer;transition:all .12s;background:#fff}
.act-icon.ok{border-color:#1D9E75;color:#1D9E75}
.act-icon.ok:hover{background:#1D9E75;color:#fff}
.act-icon.undo{border-color:#E24B4A;color:#E24B4A}
.act-icon.undo:hover{background:#fdecea}

.sec{display:flex;align-items:center;gap:6px;padding:7px 10px 4px;font-size:12px;font-weight:900;color:#111;letter-spacing:0.02em}
.sec-line{flex:1;height:1px;background:#ddd}
.sec-count{font-size:10px;font-weight:700;color:#aaa}
.sec-new{border-top:2px solid #E24B4A;color:#E24B4A;margin-top:2px}
.sec-wait{border-top:2px solid #111;margin-top:6px}
.sec-walkin{border-top:2px solid #E87700;margin-top:6px;color:#E87700}
.sec-done{border-top:2px dashed #bbb;margin-top:6px;color:#888}
.walkin-input-row{display:flex;gap:6px;padding:5px 10px 4px;align-items:center}
.walkin-phone-inline{font-family:'Noto Sans KR',sans-serif;flex:1;font-size:14px;font-weight:700;padding:7px 11px;border:2px solid #ddd;border-radius:8px;outline:none;color:#111;transition:border-color .15s}
.walkin-phone-inline:focus{border-color:#E87700}
.walkin-inline-btn{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:8px;border:1.5px solid #E87700;background:#E87700;color:#fff;cursor:pointer;white-space:nowrap}
.walkin-row td{background:#FFF8F0 !important}
.empty{text-align:center;padding:28px;color:#bbb;font-size:13px;font-weight:500}
tr.time-sep td{padding:3px 0;background:#f2f3f5;border:none}
td[ondblclick]:not([ondblclick=""]){cursor:pointer;position:relative}
td[ondblclick]:not([ondblclick=""]):hover{background:#f9f9f9 !important}
td[ondblclick]:not([ondblclick=""]):hover::after{content:'✎';font-size:9px;color:#bbb;position:absolute;bottom:2px;right:3px;line-height:1}

/* ADD FORM */
.add-form{background:#fff;border:1.5px solid #222;border-radius:6px;margin:6px 8px;padding:10px}
.add-form h3{font-size:12px;font-weight:900;margin-bottom:8px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:7px}
.fg{display:flex;flex-direction:column;gap:2px}
.fg label{font-size:10px;font-weight:700;color:#555}
.fg input,.fg select{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;padding:5px 8px;border:1.5px solid #ccc;border-radius:5px;outline:none}
.fg input:focus,.fg select:focus{border-color:#1D9E75}
.vsel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.vsel-chip{font-size:12px;font-weight:800;padding:4px 10px;border-radius:5px;border:2px solid #ddd;background:#f8f8f8;cursor:pointer;transition:all .12s}
.vsel-chip.sel-o {color:#CC0000;border-color:#CC0000;background:#fff0f0}
.vsel-chip.sel-pa{color:#111;border-color:#111;background:#f0f0f0}
.vsel-chip.sel-ko{color:#0055CC;border-color:#0055CC;background:#f0f4ff}
.form-actions{display:flex;gap:6px}
.btn-add{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:800;padding:7px 16px;background:#111;color:#fff;border:none;border-radius:5px;cursor:pointer}
.btn-cancel{font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;padding:7px 12px;background:#f5f5f5;color:#666;border:1.5px solid #ddd;border-radius:5px;cursor:pointer}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(70px);background:#111;color:#fff;padding:8px 18px;border-radius:30px;font-size:12px;font-weight:700;z-index:999;transition:transform .2s ease;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 통계 탭 */
.chart-wrap{background:#fff;margin:8px 10px;border-radius:8px;border:1.5px solid #ddd;padding:10px 12px}
.chart-title{font-size:11px;font-weight:700;color:#888;margin-bottom:6px;letter-spacing:0.04em}
.chart-legend{display:flex;gap:10px;margin-bottom:10px}
.cleg{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700}
.cleg-dot{width:9px;height:9px;border-radius:2px;display:inline-block}

/* 날짜 그룹 */
.date-group{display:flex;align-items:center;gap:0;margin-bottom:4px;border-radius:5px;overflow:hidden;border:1px solid #e8e8e8}
.date-group.is-today{border-color:#1D9E75;box-shadow:0 0 0 1px #1D9E75}
.date-group.has-warn{border-color:#E24B4A}
.dg-label{width:auto;min-width:70px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:#f8f8f8;padding:3px 6px;border-right:1px solid #e8e8e8;font-size:10px;font-weight:700;color:#555;text-align:center;white-space:nowrap}
.dg-label.is-today{color:#1D9E75;font-weight:900;background:#f0faf6}
.dg-warn-icon{font-size:9px;margin-top:1px}
.dg-bars{flex:1;display:flex;flex-direction:column;gap:1px;padding:3px 6px;justify-content:center}
.dg-bar-row{display:flex;align-items:center;gap:4px;height:11px}
.dg-bar-label{font-size:9px;font-weight:800;width:28px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden}
.dg-bar-label.lpa{color:#555}
.dg-bar-label.lo {color:#CC0000}
.dg-bar-label.lko{color:#0055CC}
.dg-bar-track{flex:1;background:#f0f0f0;border-radius:2px;height:8px;overflow:hidden}
.dg-bar-fill{height:100%;border-radius:2px;transition:width .3s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:2px}
.dg-bar-fill span{font-size:8px;font-weight:800;color:#fff;white-space:nowrap}
.fill-pa{background:#555}
.fill-o {background:#CC0000}
.fill-ko{background:#0055CC}
.fill-pa.warn{background:#111}
.fill-o.warn {background:#cc0000;box-shadow:0 0 0 1px #ff4444 inset}
.fill-ko.warn{background:#003399}
.dg-pct{font-size:9px;font-weight:700;width:26px;flex-shrink:0;text-align:left}
.pct-ok{color:#bbb}
.pct-mid{color:#E87700;font-weight:900}
.pct-hi{color:#E24B4A;font-weight:900}

/* 테이블 */
.stats-table-today{background:#f0faf6}
.stats-table-today td:first-child{color:#1D9E75;font-weight:900}
.td-pa{color:#111;font-weight:900;font-size:12px}
.td-o {color:#CC0000;font-weight:900;font-size:12px}
.td-ko{color:#0055CC;font-weight:900;font-size:12px}
.today-badge{font-size:9px;font-weight:800;background:#1D9E75;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.day-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.day-sat{background:#FFE8E8;color:#CC0000}
.day-sun{background:#FFE8E8;color:#CC0000}
.day-holiday{background:#FFE8E8;color:#CC0000}
.row-sat td:first-child{color:#CC0000}
.row-sun td:first-child{color:#CC0000}
.row-holiday td:first-child{color:#CC0000}
.row-sat{background:#FFF8F8}
.row-sun{background:#FFF8F8}
.row-holiday{background:#FFF8F8}
.sync-info{font-size:10px;color:#aaa;text-align:right;padding:4px 12px 8px;font-weight:500}

/* 가용대수 설정 */
.stats-cap-row{background:#fff;border-bottom:1px solid #e0e0e0;padding:7px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.cap-label{font-size:10px;font-weight:700;color:#888;white-space:nowrap}
.cap-inputs{display:flex;gap:8px;flex-wrap:wrap}
.cap-item{font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;border:1.5px solid}
.cap-pa{color:#111;border-color:#888;background:#f3f3f3}
.cap-o {color:#CC0000;border-color:#CC0000;background:#fff5f5}
.cap-ko{color:#0055CC;border-color:#0055CC;background:#f0f4ff}
.cap-item input{font-family:'Noto Sans KR',sans-serif;width:38px;font-size:13px;font-weight:900;border:none;background:transparent;outline:none;color:inherit;text-align:center}

/* 주의 배지 */
.warn-badge{font-size:9px;font-weight:800;background:#E24B4A;color:#fff;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle}
.warn-dot{display:inline-block;width:6px;height:6px;background:#E24B4A;border-radius:50%;margin-left:3px;vertical-align:middle}
.bar-warn{font-size:13px;width:24px;flex-shrink:0;text-align:center}

/* 문자내용 탭 */
.sms-page-header{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 12px;display:flex;align-items:baseline;gap:10px}
.sms-page-title{font-size:13px;font-weight:900}
.sms-page-sub{font-size:10px;color:#aaa;font-weight:500}
.sms-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;margin:8px 10px;overflow:hidden}
.sms-card-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f8f8;cursor:pointer;user-select:none}
.sms-card-header:hover{background:#f0f0f0}
.sms-card-body-wrap{display:none}
.sms-card-body-wrap.open{display:block;border-top:1px solid #eee}
.toggle-arrow{font-size:10px;color:#aaa;margin-left:auto;flex-shrink:0;transition:transform .15s}
.toggle-arrow.open{transform:rotate(180deg)}
.sms-num-badge{width:24px;height:24px;border-radius:5px;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.sms-card-name{font-size:13px;font-weight:900;flex:1}
.sms-card-name input{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:900;border:none;background:transparent;outline:none;width:100%;color:#111}
.sms-card-name input:focus{background:#fffbe6;border-radius:3px;padding:0 3px}
.sms-copy-btn{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;border:1.5px solid #ddd;background:#fff;cursor:pointer;color:#555;transition:all .12s}
.sms-copy-btn:hover{background:#1D9E75;color:#fff;border-color:#1D9E75}
.sms-card-body{padding:10px 12px}
.sms-card-body textarea{
  font-family:'Noto Sans KR',sans-serif;
  width:100%;font-size:12px;font-weight:500;line-height:1.7;
  border:1px solid #e8e8e8;border-radius:6px;padding:8px 10px;
  resize:vertical;min-height:80px;outline:none;color:#333;
  background:#fafafa;transition:border-color .12s, background .12s;
}
.sms-card-body textarea:focus{border-color:#1D9E75;background:#fff}
.sms-card-footer{padding:4px 12px 8px;display:flex;justify-content:space-between;align-items:center}
.sms-char-count{font-size:10px;color:#bbb}
.sms-save-btn{font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;border:1.5px solid #1D9E75;background:#1D9E75;color:#fff;cursor:pointer}

/* 메모 섹션 */
.memo-section{margin-top:6px;padding-bottom:40px}
.memo-card{background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;margin:6px 10px;overflow:hidden}
.memo-card-header{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f8f8f8;cursor:pointer;user-select:none}
.memo-card-header:hover{background:#f0f0f0}
.memo-card-body{display:none;padding:10px 12px;border-top:1px solid #eee}
.memo-card-body.open{display:block}
.memo-title-input{font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;border:none;background:transparent;outline:none;flex:1;padding:2px 4px;color:#111}
.memo-title-input:focus{background:#fffbe6;border-radius:3px}
.memo-del-btn{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;border:1.5px solid #f09595;background:#fdecea;color:#7a1111;cursor:pointer}
.memo-card-body textarea{font-family:'Noto Sans KR',sans-serif;width:100%;font-size:12px;line-height:1.6;border:1px solid #eee;border-radius:5px;padding:7px 9px;resize:vertical;min-height:60px;outline:none;color:#333;background:#fafafa}
.memo-card-body textarea:focus{border-color:#1D9E75;background:#fff}
.memo-card-footer{display:flex;justify-content:flex-end;margin-top:6px}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hd">
  <div class="hd-left">
    <div class="logo">코코<em>나라</em></div>
    <div class="today" id="today-lbl"></div>
  </div>
  <div class="hd-right">
    <button class="btn-sm green" onclick="toggleAddForm()">＋ 추가</button>
    <button class="btn-sm" onclick="refreshData()">↻</button>
  </div>
</div>

<!-- 페이지 탭 -->
<div class="page-tabs">
  <button class="page-tab on" onclick="switchPage('resv',this)">예약관리</button>
  <button class="page-tab" onclick="switchPage('stats',this)">차량통계</button>
  <button class="page-tab" onclick="switchPage('sms',this)">문자내용</button>
</div>

<!-- 1번: 예약관리 -->
<div id="page-resv" class="page-content on">

<!-- 차량 현황 패널 -->
<div class="fleet-panel">
  <div class="fleet-title">▣ 차량 현황 — 가용·남은 클릭해서 수정</div>
  <div class="fleet-card">
    <div class="fc-group">
      <div class="fc-name fc-pa">파미</div>

];

let expanded={}, extraOpen={}, selVehicles=[], nextId=200, showAdd=false;

// ── 차량 현황 (가용/남은 모두 수동 입력, 서로 영향 없음) ──
function calcFleet(){

// ── 예약 대수 요약 ──
function resvSummary(){
  const active=[...bookings,...newBookings].filter(b=>!b.done);
  const cnt={pa:0,o:0,ko:0};
  active.forEach(b=>{
    b.vehicles.forEach(v=>{
      const base=v.code.replace('"','');
      if(base==='파') cnt.pa+=v.qty;
      else if(base==='오') cnt.o+=v.qty;
      else if(base==='코') cnt.ko+=v.qty;
    });
  });
  document.getElementById('rv-pa').textContent=cnt.pa;
  document.getElementById('rv-o').textContent=cnt.o;
  document.getElementById('rv-ko').textContent=cnt.ko;
}

function smsCell(b){
  if(!b.sentSMS) b.sentSMS={};
  const mainS=SMS.filter(s=>s.main);
  const extraS=SMS.filter(s=>!s.main);
  const isOpen=!!extraOpen[b.id];
  const mainHtml=mainS.map(s=>`<button class="sms-num ${s.cls}${b.sentSMS[s.id]?' sent':''}" title="${s.title}${b.sentSMS[s.id]?' ✓발송':'미발송'}" onclick="sendSMS(${b.id},'${s.id}')">${s.label}</button>`).join('');
  const extraHtml=extraS.map(s=>`<button class="sms-num ${s.cls}${b.sentSMS[s.id]?' sent':''}" title="${s.title}${b.sentSMS[s.id]?' ✓발송':'미발송'}" onclick="sendSMS(${b.id},'${s.id}')">${s.label}</button>`).join('');
  return `<div onclick="event.stopPropagation()">
    <div class="sms-wrap">
      <div class="sms-main-btns">${mainHtml}</div>
      <div class="sms-toggle" onclick="toggleExtra(${b.id})">${isOpen?'▲':'▼'}</div>
    </div>
    <div class="sms-extra-row${isOpen?' open':''}">${extraHtml}</div>
  </div>`;
}

function autoHyphen(v){
  v = v.replace(/\D/g,'');
  if(v.length > 11) v = v.slice(0,11);
  if(v.length > 7) return v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  if(v.length > 3) return v.slice(0,3)+'-'+v.slice(3);
  return v;
}

function editCell(id, field, el){
  const b=[...bookings,...newBookings].find(x=>x.id===id);
  if(!b) return;
  const cur = field==='vehicles' ? b.vehicles.map(v=>v.code+(v.qty>1?v.qty:'')).join(' ')
            : field==='site' ? b.site
            : b[field];
  const input = document.createElement('input');
  input.value = cur;
  if(field==='phone') input.type='tel';
  input.style.cssText='font-family:inherit;font-size:inherit;font-weight:inherit;border:none;border-bottom:2px solid #1D9E75;outline:none;background:#fffbe6;width:100%;padding:0;color:inherit;';
  el.innerHTML='';
  el.appendChild(input);
  input.focus(); input.select();
  if(field==='phone'){
    input.addEventListener('input', ()=>{ const pos=input.selectionStart; input.value=autoHyphen(input.value); });
  }
  function save(){
    const val = input.value.trim();
    if(!val){ render(); return; }
    if(field==='vehicles'){
      b.vehicles = val.split(/\s+/).map(s=>{
        const m=s.match(/^([가-힣a-zA-Z"]+)(\d*)$/);
        return m?{code:m[1],qty:parseInt(m[2])||1}:{code:s,qty:1};
      });
      b.totalQty = b.vehicles.reduce((s,v)=>s+v.qty,0);
    } else if(field==='phone'){
      b[field] = autoHyphen(val);
    } else if(field==='site'){
      b.site = val;
    } else {
      b[field] = val;
    }
    render();
  }
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter') input.blur(); if(e.key==='Escape'){ render(); } });
}

function buildTable(list, mode='wait'){
  if(!list.length) return `<div class="empty">${mode==='new'?'신규 예약 없음':mode==='done'?'완료 없음':'대기 예약 없음'}</div>`;
  let rows='';
  let lastTime='';
  list.forEach(b=>{
    const si=SITE_LABEL[b.site]||{main:b.site,sub:''};
    // 시간대 구분선 (완료 섹션 제외)
    if(mode!=='done' && b.time !== lastTime && lastTime !== ''){
      rows+=`<tr class="time-sep"><td colspan="7"></td></tr>`;
    }
    lastTime=b.time;
    const editable = mode!=='done';
    rows+=`
    <tr class="${b.done?'done':''}">
      <td onclick="event.stopPropagation()" style="text-align:center">
        ${mode==='new'
          ? `<button class="act-icon ok" onclick="moveToWait(${b.id})" title="대기로 올리기">→</button>`
          : mode==='done'
          ? `<button class="act-icon undo" onclick="markDone(${b.id})" title="되돌리기">↩</button>`
          : `<button class="act-icon ok" onclick="markDone(${b.id})" title="완료처리">✓</button>`
        }
      </td>
      <td class="td-time" ondblclick="${editable?`event.stopPropagation();editCell(${b.id},'time',this)`:''}">${b.time}</td>
      <td class="td-name" ondblclick="${editable?`event.stopPropagation();editCell(${b.id},'name',this)`:''}">${b.name}${b.isNew&&!b.movedToWait?'<span class="new-bd">NEW</span>':''}</td>
      <td ondblclick="${editable?`event.stopPropagation();editCell(${b.id},'vehicles',this)`:''}" style="${editable?'cursor:text':''}"><div class="vehicles">${vHtml(b.vehicles)}</div></td>
      <td class="td-site" ondblclick="${editable?`event.stopPropagation();editCell(${b.id},'site',this)`:''}">${si.main}</td>
      <td class="td-phone" style="font-size:12px;font-weight:700;color:#999;${editable?'cursor:text':''}" ondblclick="${editable?`event.stopPropagation();editCell(${b.id},'phone',this)`:''}">${b.phone}</td>
      <td onclick="event.stopPropagation()">${smsCell(b)}</td>
    </tr>`;
  });
  const hdr = mode==='new'
    ? '<th>대기</th><th>시간</th><th>이름</th><th>차량</th><th>채널</th><th>연락처</th><th>문자</th>'
    : mode==='done'
    ? '<th>복귀</th><th>시간</th><th>이름</th><th>차량</th><th>채널</th><th>연락처</th><th>문자</th>'
    : '<th>완료</th><th>시간</th><th>이름</th><th>차량</th><th>채널</th><th>연락처</th><th>문자</th>';
  return `<table>
    <thead><tr>${hdr}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function render(){
  const all=[...bookings,...newBookings];
  const newList=newBookings.filter(b=>b.isNew&&!b.done&&!b.movedToWait);
  const timeOrder=['9시','10시','11시','12시','1시','2시','3시','4시','5시','6시','7시','8시'];
  const waitList=all.filter(b=>!b.done&&(!b.isNew||b.movedToWait))
    .sort((a,b)=>{
      const ai=timeOrder.indexOf(a.time), bi=timeOrder.indexOf(b.time);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });
  const doneList=doneOrder.map(id=>all.find(b=>b.id===id)).filter(Boolean);

  document.getElementById('new-tbl').innerHTML=buildTable(newList,'new');
  document.getElementById('active-tbl').innerHTML=buildTable(waitList,'wait');
  renderDoneTbl();
  resvSummary();

  const nc=document.getElementById('new-count');
  if(nc) nc.textContent=newList.length?`${newList.length}건`:'';
}

function moveToWait(id){
  const b=[...bookings,...newBookings].find(x=>x.id===id);
  if(!b) return;
  b.movedToWait=true;
  expanded[id]=false;
  toast(`✅ ${b.name}님 대기로 이동!`);
  render();
}

function toggleRow(id){}
function toggleExtra(id){extraOpen[id]=!extraOpen[id];render()}

function markDone(id){
  const b=[...bookings,...newBookings].find(x=>x.id===id);
  if(!b)return;
  b.done=!b.done;

async function loadBookingsFromGAS(){
  try{
    const [resB, resN] = await Promise.all([
      fetch(`${GAS_URL}?action=getBookings`),
      fetch(`${GAS_URL}?action=getNew`)
    ]);
    const dataB = await resB.json();
    const dataN = await resN.json();
    if(dataB.error) throw new Error(dataB.error);
    if(dataN.error) throw new Error(dataN.error);

    // 시트 데이터를 기존 bookings 구조로 변환
    bookings = (dataB.bookings||[]).map((row,i)=>({
      id: 1000 + i,
      time: row.time,
      name: row.name,
      vehicles: row.vehicles && row.vehicles.length ? row.vehicles : [{code:'-',qty:row.qty||1}],
      site: row.channel,
      totalQty: row.qty || 1,
      phone: row.phone,
      sms: row.smsSent || false,
      done: row.done || false
    }));

    newBookings = (dataN.newBookings||[]).map((row,i)=>({
      id: 5000 + i,
      time: row.time,
      name: row.name,
      vehicles: row.vehicles && row.vehicles.length ? row.vehicles : [{code:'-',qty:row.qty||1}],
      site: row.channel,
      totalQty: row.qty || 1,
      phone: row.phone,
      sms: false,
      done: false,
      isNew: true
    }));

    doneOrder = bookings.filter(b=>b.done).map(b=>b.id);
    render();
    toast('✅ 구글시트 연동 완료');
  }catch(e){
    console.warn('GAS 연동 실패, 샘플 데이터 사용:', e.message);
    bookings.filter(b=>b.done).forEach(b=>doneOrder.push(b.id));
    render();
  }
}

// 1분마다 신규예약 자동 갱신 (당일 신규예약 polling)
setInterval(async ()=>{
  try{
    const res = await fetch(`${GAS_URL}?action=getNew`);
    const data = await res.json();
    if(data.error) return;
    const prevCount = newBookings.filter(b=>b.isNew && !b.movedToWait).length;
    newBookings = (data.newBookings||[]).map((row,i)=>{
      // 기존 항목이 대기로 이동했었다면 상태 유지
      const existing = newBookings.find(x=>x.phone===row.phone && x.time===row.time && x.name===row.name);
      return {
        id: existing ? existing.id : 5000+i+Date.now()%1000,
        time: row.time, name: row.name,
        vehicles: row.vehicles && row.vehicles.length ? row.vehicles : [{code:'-',qty:row.qty||1}],
        site: row.channel, totalQty: row.qty||1, phone: row.phone,
        sms: existing ? existing.sms : false,
        done: existing ? existing.done : false,
        movedToWait: existing ? existing.movedToWait : false,
        isNew: true
      };
    });
    const newCount = newBookings.filter(b=>b.isNew && !b.movedToWait).length;
    if(newCount > prevCount) toast(`🔴 신규예약 ${newCount-prevCount}건 도착!`);
    render();
  }catch(e){ /* 조용히 무시 */ }
}, 60000);

let smsConfigLoaded = false;

async function loadSmsConfigFromGAS(){
  try{
    const res = await fetch(`${GAS_URL}?action=getSmsConfig`);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    if(data.settings && data.settings.length){
      data.settings.forEach(s=>{
        const target = smsSettings.find(x=>x.id===s.id);
        if(target && s.body){ target.name = s.name || target.name; target.body = s.body; }
      });
    }
    if(data.memos && data.memos.length){
      memos = data.memos.map(m=>{
        // memo 접두사 제거하여 숫자 id로 복원 (없으면 새 id 발급)
        const idStr = String(m.id);
        const numId = idStr.startsWith('memo') ? parseInt(idStr.replace('memo',''),10) : (memoNextId++);
        return {id: numId || (memoNextId++), title:m.title, body:m.body};
      });
      const maxId = Math.max(1000, ...memos.map(m=>m.id));
      memoNextId = maxId + 1;
    }
    syncSmsToMain();
  }catch(e){
    console.warn('문자내용 GAS 로드 실패, 기본값 사용:', e.message);
  } finally {
    smsConfigLoaded = true;
    renderSmsPage();
  }
}

  if(m){
    m[field] = val;
    saveSmsConfigToGAS().then(ok=>{ if(ok) toast('✅ 저장됨'); });
  }
}

// ── 현장손님 ──

function formatWalkinPhone(el){
  let v=el.value.replace(/\D/g,'');
  if(v.length>11) v=v.slice(0,11);
  if(v.length>7) v=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  else if(v.length>3) v=v.slice(0,3)+'-'+v.slice(3);
  el.value=v;
}

function addWalkinInline(){
  const el = document.getElementById('walkin-phone-inline');
  const phone = el.value.trim();
  if(!phone){ toast('⚠️ 연락처를 입력해주세요'); return; }
  if(walkinList.find(w=>w.phone===phone&&!w.done)){
    toast('이미 추가된 연락처예요'); return;
  }
  walkinList.push({id:walkinNextId++, phone, time:nowTime(), sentSms:{}, done:false});
  el.value='';
  renderWalkinTbl();
  renderDoneTbl();
  toast(`✅ ${phone} 추가됨!`);
}

function nowTime(){
  const d=new Date(), h=d.getHours(), m=String(d.getMinutes()).padStart(2,'0');
  return `${h}시${m}`;
}

async function sendWalkinSmsRow(id, smsId){
  const w = walkinList.find(x=>x.id===id);
  const t = SMS.find(x=>x.id===smsId);
  if(!w||!t) return;
  await sendSmsViaGAS(w.phone, t.label, t.title);
  if(!w.sentSms) w.sentSms={};
  w.sentSms[smsId] = true;
  renderWalkinTbl();
}

function markWalkinDone(id){
  const w = walkinList.find(x=>x.id===id);
  if(!w) return;
  w.done = !w.done;
  if(w.done){ walkinDoneOrder.push(id); }
  else { walkinDoneOrder = walkinDoneOrder.filter(x=>x!==id); }
  renderWalkinTbl();
  renderDoneTbl();
  toast(w.done?'✅ 완료처리':'↩️ 되돌렸어요');
}

function renderWalkinTbl(){
  const colors=[{b:'#1D9E75',c:'#1D9E75'},{b:'#0055CC',c:'#0055CC'},{b:'#CC7700',c:'#CC7700'},{b:'#880088',c:'#880088'},{b:'#CC0000',c:'#CC0000'},{b:'#555',c:'#555'}];
  const active = walkinList.filter(w=>!w.done);
  const el = document.getElementById('walkin-tbl');
  if(!active.length){ el.innerHTML='<div class="empty">현장손님 없음</div>'; return; }
  const rows = active.map(w=>{
    const btns = SMS.map((s,i)=>{
      const c=colors[i]||colors[0];
      const sent=!!(w.sentSms&&w.sentSms[s.id]);
      return `<span class="sms-num" style="width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;border:1.5px solid ${c.b};color:${sent?'#fff':c.c};background:${sent?c.b:'#fff'};font-size:11px;font-weight:800;cursor:pointer;margin-right:2px" onclick="sendWalkinSmsRow(${w.id},'${s.id}')" title="${s.title}">${s.label}</span>`;
    }).join('');
    return `<tr class="walkin-row">
      <td onclick="event.stopPropagation()" style="text-align:center">
        <button class="act-icon ok" onclick="markWalkinDone(${w.id})" title="완료처리">✓</button>
      </td>
      <td class="td-time">${w.time}</td>
      <td class="td-name" style="color:#E87700;font-weight:900">현장</td>
      <td>—</td><td>—</td>
      <td class="td-phone">${w.phone}</td>
      <td onclick="event.stopPropagation()"><div style="display:flex;gap:0;flex-wrap:nowrap;align-items:center">${btns}</div></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<table><thead><tr><th>완료</th><th>시간</th><th>구분</th><th>차량</th><th>채널</th><th>연락처</th><th>문자</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// 완료 섹터 렌더 (예약 완료 + 현장손님 완료 합산)
function renderDoneTbl(){
  const all=[...bookings,...newBookings];
  const resvDone = doneOrder.map(id=>all.find(b=>b.id===id)).filter(Boolean);
  const walkinDone = walkinDoneOrder.map(id=>walkinList.find(w=>w.id===id)).filter(Boolean);
  const el = document.getElementById('done-tbl');

  if(!resvDone.length && !walkinDone.length){
    el.innerHTML='<div class="empty">완료 없음</div>';
    const dc=document.getElementById('done-count');
    if(dc) dc.textContent='';
    return;
  }

  // 현장손님 행 — smsCell과 동일한 구조로 맞춤
  const walkinRows = walkinDone.map(w=>{
    // sentSms 객체를 b처럼 흉내
    const fakeB = {id:w.id, done:true, sentSms:w.sentSms||{}, isNew:false, movedToWait:false};
    const smsCellHtml = smsCell(fakeB);
    return `<tr class="done walkin-row">
      <td onclick="event.stopPropagation()" style="text-align:center">
        <button class="act-icon undo" onclick="markWalkinDone(${w.id})" title="되돌리기">↩</button>
      </td>
      <td class="td-time">${w.time}</td>
      <td class="td-name" style="color:#E87700;font-weight:900">현장</td>
      <td>—</td><td>—</td>
      <td class="td-phone">${w.phone}</td>
      <td onclick="event.stopPropagation()">${smsCellHtml}</td>
    </tr>`;
  }).join('');

  // 예약완료 + 현장완료 하나의 테이블로
  const thead = `<thead><tr><th>복귀</th><th>시간</th><th>이름</th><th>차량</th><th>채널</th><th>연락처</th><th>문자</th></tr></thead>`;
  const resvRows = resvDone.map(b=>{
    const si=SITE_LABEL[b.site]||{main:b.site,sub:''};
    return `<tr class="done">
      <td onclick="event.stopPropagation()" style="text-align:center">
        <button class="act-icon undo" onclick="markDone(${b.id})" title="되돌리기">↩</button>
      </td>
      <td class="td-time">${b.time}</td>
      <td class="td-name">${b.name}</td>
      <td><div class="vehicles">${vHtml(b.vehicles)}</div></td>
      <td class="td-site">${si.main}</td>
      <td class="td-phone" style="font-size:12px;font-weight:700;color:#999">${b.phone}</td>
      <td onclick="event.stopPropagation()">${smsCell(b)}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `<table>${thead}<tbody>${resvRows}${walkinRows}</tbody></table>`;
  const dc=document.getElementById('done-count');
  if(dc) dc.textContent=`${resvDone.length+walkinDone.length}건`;
}
function switchPage(name, el){
  document.querySelectorAll('.page-tab').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.page-content').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('page-'+name).classList.add('on');
  if(name==='stats') loadStats();
  if(name==='sms'){ if(!smsConfigLoaded) loadSmsConfigFromGAS(); else renderSmsPage(); }
}

// ── 차량통계 ──
// ===== Google Apps Script 웹앱 URL (구글시트 ↔ 홈페이지 연동) =====
// (선언은 파일 상단으로 이동함)

let statsData=[];

async function loadStats(){
  document.getElementById('stats-table').innerHTML='<div style="text-align:center;padding:20px;color:#bbb;font-size:12px">구글시트 연동 중...</div>';
  try{
    const res=await fetch(`${GAS_URL}?action=getStats`);
    if(!res.ok) throw new Error();
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    statsData = data.stats || [];
    renderStats();
    document.getElementById('sync-info').textContent=`마지막 업데이트: ${new Date().toLocaleTimeString('ko-KR')}`;
  }catch(e){
    useSampleStats();
    document.getElementById('sync-info').textContent='⚠️ 시트 연결 실패 — 샘플 표시 (' + e.message + ')';
  }
}

    {date:'2026년 6월 12일 (금)',pa:5, o:11,ko:3},
    {date:'2026년 6월 13일 (토)',pa:3, o:7, ko:3},
    {date:'2026년 6월 14일 (일)',pa:3, o:10,ko:5},
    {date:'2026년 6월 15일 (월)',pa:0, o:4, ko:0},

    {date:'2026년 6월 17일 (수)',pa:1, o:0, ko:1},

  ];

function renderStats(){
  if(!statsData.length)return;
  const d=new Date();
  const todayPrefix=`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
  const maxVal=Math.max(...statsData.map(r=>r.pa+r.o+r.ko),1);

  // 가용 대수
  const capPa=parseInt(document.getElementById('cap-pa').value)||35;
  const capO =parseInt(document.getElementById('cap-o').value)||22;
  const capKo=parseInt(document.getElementById('cap-ko').value)||50;

  // 차트 — 날짜별 3행 그룹
  // 테이블
  function cellHtml(v, cap, colorCls){
    const p = Math.min(Math.round(v/cap*100),100);
    const isHi   = p >= 70;
    const isMid  = p >= 50 && p < 70;
    let bg = '';
    if(isHi)       bg = 'background:#FFF3B0';
    else if(isMid) bg = 'background:#FFF3B0';
    const pColor = isHi?'#CC0000':isMid?'#996600':'#aaa';
    return `<td style="${bg};padding:4px 8px">
      <span class="${colorCls}">${v}</span>
      <span style="font-size:9px;font-weight:700;color:${pColor};margin-left:3px">${p}%</span>
      ${isHi?'<span class="warn-dot"></span>':''}
    </td>`;
  }
  // 2026년 공휴일 목록 (월-1, 일)
  const HOLIDAYS = {
    '1-1':'신정','3-1':'삼일절','5-5':'어린이날','6-6':'현충일',
    '8-15':'광복절','10-3':'개천절','10-9':'한글날','12-25':'성탄절',
    '1-29':'설연휴','1-28':'설연휴','1-30':'설연휴',
    '5-6':'어린이날대체','9-25':'추석연휴','9-26':'추석연휴','9-27':'추석연휴','9-28':'추석연휴'
  };
  const rows=statsData.map(r=>{
    const isT=r.date.startsWith(todayPrefix);
    const short=r.date.replace(/\d{4}년 /,'').replace(/ \(.\)/,'');
    const dow=r.date.match(/\((.)\)/)?.[1]||'';
    const rowWarn=(r.pa/capPa>=0.7)||(r.o/capO>=0.7)||(r.ko/capKo>=0.7);
    // 날짜 파싱으로 주말/공휴일 판단
    const mMatch=r.date.match(/(\d+)월 (\d+)일/);
    const isSat=dow==='토', isSun=dow==='일';
    const hKey=mMatch?`${parseInt(mMatch[1])-1}-${mMatch[2]}`:null;
    const holiday=hKey?HOLIDAYS[hKey]:null;
    let dayBadge='';
    if(holiday)      dayBadge=`<span class="day-badge day-holiday">공휴</span>`;
    else if(isSat)   dayBadge=`<span class="day-badge day-sat">토</span>`;
    else if(isSun)   dayBadge=`<span class="day-badge day-sun">일</span>`;
    return `<tr class="${isT?'stats-table-today':''}${isSat?' row-sat':''}${isSun?' row-sun':''}${holiday?' row-holiday':''}">
      <td>${short}(${dow})${dayBadge}${isT?'<span class="today-badge">오늘</span>':''}${rowWarn?'<span class="warn-badge">⚠️</span>':''}</td>
      ${cellHtml(r.pa,capPa,'td-pa')}
      ${cellHtml(r.o, capO, 'td-o')}
      ${cellHtml(r.ko,capKo,'td-ko')}
    </tr>`;
  }).join('');
  document.getElementById('stats-table').innerHTML=`
    <table>
      <thead><tr>
        <th style="text-align:left">날짜</th>
        <th style="color:#ccc">파미</th>
        <th style="color:#f99">오픈카</th>
        <th style="color:#88aaff">코코</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
</script>
